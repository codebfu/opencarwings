---
- name: Deploy OpenCARWINGS
  hosts: carwings
  become: true

  vars:
    # Required variables to change before first deployment.
    opencarwings_db_password: "CHANGE_ME_DB_PASSWORD"
    opencarwings_domain: "CHANGE_ME_DOMAIN"
    opencarwings_letsencrypt_email: "CHANGE_ME_EMAIL"
    opencarwings_cloudflare_api_token: "CHANGE_ME_CLOUDFLARE_TOKEN"

  roles:
    - role: opencarwings
